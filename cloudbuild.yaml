steps:
  # --- Backend ---
  # 1. Build the Backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-backend",
        "-f",
        "backend/Dockerfile",
        ".",
      ]

  # 2. Push the Backend image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-backend",
      ]

  # 3. Deploy Backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "veracity-backend"
      - "--image"
      - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-backend"
      - "--region"
      - "asia-southeast1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      # This links the GCP Secret to the Env Var name NestJS expects
      - "--set-secrets"
      - "DATABASE_USER=DATABASE_USER:latest,DATABASE_PASSWORD=DATABASE_PASSWORD:latest,DATABASE_NAME=DATABASE_NAME:latest,DATABASE_HOST=DATABASE_HOST:latest,DATABASE_PORT=DATABASE_PORT:latest,FRONTEND_URL=FRONTEND_URL:latest"
      - "--add-cloudsql-instances"
      - "$PROJECT_ID:asia-southeast1:veracity-db-instance"

  # --- Frontend ---
  # 4. Build the Frontend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-frontend",
        "-f",
        "frontend/Dockerfile",
        "--build-arg",
        "VITE_BACKEND_URL=$_VITE_BACKEND_URL",
        ".",
      ]

  # 5. Push the Frontend image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-frontend",
      ]

  # 6. Deploy Frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "veracity-frontend"
      - "--image"
      - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-frontend"
      - "--region"
      - "asia-southeast1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-backend"
  - "asia-southeast1-docker.pkg.dev/$PROJECT_ID/veracity-repo/veracity-frontend"
